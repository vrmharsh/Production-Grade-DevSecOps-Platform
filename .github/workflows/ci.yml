name: CI pipelines

# below means only run if the target branch is main.
on:
 pull_request:
  branches:
   - main
 push:
  branches:
   - main

# two jobs mens parallel jobs so over all pipeline is faster.
jobs:
 frontend-build-and-test:
#  runs-on: ubuntu-latest   # Full Ubuntu VM (currently maps to ubuntu-22.04)
   runs-on: 
    - self-hosted
    - devsecops

   steps:
# a vm is created when pipeline is triggered 
# and it is empty, so first step is that it needs the do git clone repository which is handled by checkout stage.   
   - name: Checkout Code
     uses: actions/checkout@v4

   - name: setup node js
     uses: actions/setup-node@v4
     with: 
      node-version: 18
      cache: npm
      cache-dependency-path: frontend/package-lock.json

# the above method is automatic because here git-hub manages the things.

   - name: install frontend dependencies
     working-directory: frontend
     run: npm ci #npm install
# npm ci is faster, removed the previous installed dpendencies, faster, make sure to download the dpendencies that matches exaclty the code for example node version 18 which currently the application is written in.
   
   - name: build frontend application
     working-directory: frontend
     run: npm run build
    
#   - name: run frontend tests
#     run: npm test
   
   - name: package the frontend build
     run: |
       tar -czf frontend-build.tar.gz frontend/build

   - name: upload the frontend artifacts
     uses: actions/upload-artifact@v6
     with:
       name: frontend-build
       path: frontend-build.tar.gz


 backend-build-and-test:
#  runs-on: ubuntu-latest 
  runs-on:
   - self-hosted
   - devsecops
  
  steps:
   - name: checkout code
     uses: actions/checkout@v4

   - name: setup backend node js
     uses: actions/setup-node@v4
     with: 
      node-version: 18
      cache: npm
      cache-dependency-path: backend/package-lock.json
  
   - name: install backend dependencies
     working-directory: backend
     run: npm ci #npm install

#   - name: run backend test
#     run: npm run test
   
   - name: package the backend build
     run: |
       tar -czf backend-build.tar.gz backend

   - name: upload the backend artifacts
     uses: actions/upload-artifact@v6
     with:
      name: backend-build
      path: backend-build.tar.gz

 sonarqube:
  name: static code analysis
  
  runs-on:
   - self-hosted
   - devsecops
  
  needs:
   - frontend-build-and-test
   - backend-build-and-test

  steps:
   - name: code checkout stage
     uses: actions/checkout@v6
   
   - name: debug sonarqube connectivity
     env: 
      SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
     run: | 
       echo 'host url is $SONAR_HOST_URL'
       curl -v $SONAR_HOST_URL/api/system/status

   - name: sonarqube scanning
     uses: SonarSource/sonarqube-scan-action@v6
     env: 
      SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}
      SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
   
  
  
 semgrep:
  name: SAST

  runs-on:
   - self-hosted
   - devsecops

  needs:
   - frontend-build-and-test
   - backend-build-and-test

  permissions:
    security-events: write
    actions: read
    contents: read

  steps:
   - name: code checkout
     uses: actions/checkout@v4

   - name: semgrep verification
     run: semgrep --version

   - name: semgrep scanning
     run: | 
      semgrep scan --config auto \
      --sarif \
      --output semgrep.sarif .

   - name: SARIF Upload
     uses: github/codeql-action/upload-sarif@v3
     with: 
       sarif_file: semgrep.sarif

# below has been commented because semgrep cloud account is not used over here. But Semgrep OSS and SARIF report generated and given to git-hub security for the analysis.
#     env:
#      semgrep_host_url: ${{secrets.semgrep_host_url}}
#      semgrep_host_token: ${{secrets.semgrep_host_token}}
     


# push artifacts to nexus
  
 nexus:
  name: artifacts

  runs-on:
   - self-hosted
   - devsecops
   
  needs:
   - sonarqube
   - semgrep

  steps:
   - name: code checkout
     uses: actions/checkout@v6

   - name: download the frontend artifacts from git hub
     uses: actions/download-artifact@v6
     with: 
       name: frontend-build
       path: artifacts/frontend

   - name: download the backend artifacts from git hub
     uses: actions/download-artifact@v6
     with: 
       name: backend-build
       path: artifacts/backend
   
   - name: verify the download file
     run: | 
      pwd 
      ls -lh

   - name: upload frontend artifacts to nexus
     env:
      NEXUS_USERNAME: ${{secrets.NEXUS_USERNAME}}
      NEXUS_PASSWORD: ${{secrets.NEXUS_PASSWORD}}
      NEXUS_URL: ${{secrets.NEXUS_URL}}

     run: | 
       curl -u "$NEXUS_USERNAME:$NEXUS_PASSWORD" \
         --upload-file artifacts/frontend/frontend-build.tar.gz \
         "$NEXUS_URL/repository/devsecops-artifacts/frontend-build.tar.gz"
       
   - name: upload backend artifacts to nexus
     env:
       NEXUS_USERNAME: ${{secrets.NEXUS_USERNAME}}
       NEXUS_PASSWORD: ${{secrets.NEXUS_PASSWORD}}
       NEXUS_URL: ${{secrets.NEXUS_URL}} 

     run: | 
       curl -u "$NEXUS_USERNAME:$NEXUS_PASSWORD" \
         --upload-file artifacts/backend/backend-build.tar.gz \
         "$NEXUS_URL/repository/devsecops-artifacts/backend-build.tar.gz"

