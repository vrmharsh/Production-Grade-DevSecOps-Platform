apiVersion: apps/v1

kind: Deployment

metadata:
   name: "frontend-stable"
   namespace: "stage-canary"
   labels: 
    app: "frontend-stable-label"

spec:

    replicas: 2

    selector:
     matchLabels:
      app: "frontend-stable-label"

    template:
      
     metadata:
      labels:
       app: "frontend-stable-label"

     spec:
        containers:
        - name: "frontend-stable-container"
          image: harshvrm10/portfolio-app-repo:portfolio-app-frontend-v3
          ports:
          - containerPort: 3000

          resources:
           requests:
             cpu: "200m"
             memory: "500Mi"
           limits:
             cpu: "500m"
             memory: "1Gi"
        
          readinessProbe:
           httpGet:
              path: /
              port: 3000

           initialDelaySeconds: 20
           periodSeconds: 15

           successThreshold: 1
           timeoutSeconds: 5
           failureThreshold: 3

          livenessProbe:
           httpGet:
              path: /
              port: 3000
           initialDelaySeconds: 20
           periodSeconds: 15

           successThreshold: 1
           timeoutSeconds: 5
           failureThreshold: 3

          env:
           - name: "MYDATABASE"
             valueFrom:
              secretKeyRef:
               name: "backend-secrets-canary-stable"
               key: MYDATABASE