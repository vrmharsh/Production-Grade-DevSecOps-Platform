tempo:
  repository: grafana/tempo

service:
  type: ClusterIP
  additionalPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP

    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

tempoQuery:
  enabled: true

persistence:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"

livenessProbe:
  enabled: true
  initialDelaySeconds: 90
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5


config: |
  auth_enabled: false

  server:
    http_listen_port: 3200
    http_listen_address: 0.0.0.0

  distributor:
   receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m

  compactor:
    compaction:
      block_retention: 24h

  storage:
    trace:
      backend: local
      local:
        path: /tmp/tempo/traces
      wal:
        path: /tmp/tempo/wal


  