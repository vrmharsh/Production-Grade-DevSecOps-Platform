apiVersion: apps/v1
kind: DaemonSet

metadata:
   name: "fluent-bit-daemonset"
   namespace: monitoring
   labels:
    app: "fluent-bit-daemonset-label"


spec:
  selector:
   matchLabels:
    app: "fluent-bit-daemonset-label"

  template:

    metadata:
      labels:
        app: "fluent-bit-daemonset-label"

    spec:
      serviceAccountName: "fluent-bit-service-account"

      containers:
       - name: "fluent-bit-daemonset-container"
         image: fluent/fluent-bit:2.2
         ports:
          - containerPort: 3100
         args:
          - -c
          - /etc/fluent-bit/fluent-bit.conf

         volumeMounts:
          - name: fluent-bit-config-volume
            mountPath: /etc/fluent-bit

          - name: varlog
            mountPath: /var/log

          - name: containers
            mountPath: /var/log/containers
            readOnly: true
         
      volumes:
       - name: fluent-bit-config-volume
         configMap:
           name: config-map-for-fluent-bit

       - name: varlog
         hostPath:
          path: /var/log

       - name: containers
         hostPath:
          path: /var/log/containers