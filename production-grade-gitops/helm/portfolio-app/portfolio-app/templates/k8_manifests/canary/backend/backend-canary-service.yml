{{- if eq .Values.deploymentStrategy "canary" }}

apiVersion: v1

kind: Service

metadata:
  name: "backend-canary-service"
  namespace: {{ .Values.namespace }}

spec:

  selector:
    app: "backend-canary-label"

  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
 

  type: ClusterIP

{{- end }}