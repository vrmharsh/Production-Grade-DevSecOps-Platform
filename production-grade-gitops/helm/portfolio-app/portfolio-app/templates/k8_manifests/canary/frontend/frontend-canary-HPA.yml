{{- if eq .Values.deploymentStrategy "canary" }}

apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: "frontend-canary-hpa"
  namespace: "stage-canary"

spec:
  
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "frontend-canary"

  minReplicas: 1
  maxReplicas: 3

  metrics:

  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
     

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50

{{- end }}