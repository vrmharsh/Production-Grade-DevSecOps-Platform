{{- if eq .Values.deploymentStrategy "blueGreen" }}

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy

metadata:
  name: backend-blue-authz
  namespace: prod-blue-green

spec:
  selector:
    matchLabels:
      app: backend-blue-deployment-label

  action: ALLOW

  rules:
  - from:
    - source:
        principals:
        - cluster.local/ns/prod-blue-green/sa/default

{{- end }}

