{{- if eq .Values.deploymentStrategy "blueGreen" }}

apiVersion: apps/v1

kind: Deployment

metadata:
   name: "backend-green-deployment"
   namespace: {{ .Values.namespace }}
   labels: 
     app: backend-green-deployment-label

spec:
   
   replicas: {{ .Values.backend.green.replicaCount }}     

   selector: 
     matchLabels:
       app: backend-green-deployment-label
       version: green

   template:

     metadata:
       labels: 
         app: backend-green-deployment-label
         version: green

     spec:
       containers:
       - name: "backend-green-container"
         image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.green.imageTag }}"
         ports: 
          - containerPort: 5000

         resources:
          requests:
           cpu: "50m"
           memory: "128Mi"

          limits:
           cpu: "200m"
           memory: "256Mi"

         readinessProbe:
           httpGet:
             path: /health
             port: 5000
           initialDelaySeconds: 15
           periodSeconds: 20
            
           timeoutSeconds: 5 
           successThreshold: 1
           failureThreshold: 3

         livenessProbe:
           httpGet:
             path: /health
             port: 5000
           initialDelaySeconds: 15
           periodSeconds: 20
            
           timeoutSeconds: 5 
           failureThreshold: 3
        
         env:
          - name: PORT
            value: "5000"

          - name: MYDATABASE
            valueFrom:
             secretKeyRef:
               name: "backend-secrets-bg" 
               key: MYDATABASE

{{- end }}
     

