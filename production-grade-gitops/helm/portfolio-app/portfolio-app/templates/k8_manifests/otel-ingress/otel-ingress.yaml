apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: otel-ingress
  namespace: monitoring

spec:
  ingressClassName: nginx

  rules:
    - host: otel.internal
      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: otel-collector-opentelemetry-collector
                port:
                  number: 4318